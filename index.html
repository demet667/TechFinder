<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechFinder</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
  <div class="logo">⚡ TechFinder</div>
  <p>Compare les meilleurs produits tech</p>

  <input id="search" placeholder="🔍 Rechercher un produit...">
</header>

<nav class="filters">
  <button onclick="filterCategory('all')">Tout</button>
  <button onclick="filterCategory('smartphone')">Smartphones</button>
  <button onclick="filterCategory('laptop')">PC Portable</button>
  <button onclick="filterCategory('gaming')">Gaming</button>
  <button onclick="filterCategory('tv')">TV</button>
  <button onclick="filterCategory('audio')">Audio</button>
  <button onclick="filterCategory('camera')">Caméra</button>
  <button onclick="filterCategory('accessoire')">Accessoires</button>
</nav>

<div class="ad">PUBLICITÉ</div>

<main id="products" class="grid"></main>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box">
    <span class="close" onclick="closePopup()">✖</span>
    <img id="popupImg">
    <h2 id="popupTitle"></h2>
    <p id="popupDesc"></p>
    <a id="popupLink" target="_blank" class="buy-btn">Voir le produit</a>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
