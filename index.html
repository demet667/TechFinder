<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechFinder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">⚡ TechFinder</div>
  <input type="text" id="searchInput" placeholder="Rechercher un produit...">
</header>

<div class="filters">
  <button data-filter="all">Tous</button>
  <button data-filter="smartphone">Smartphones</button>
  <button data-filter="laptop">PC Portable</button>
  <button data-filter="gaming">Gaming</button>
  <button data-filter="tv">TV</button>
  <button data-filter="audio">Audio</button>
</div>

<div id="products" class="grid"></div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">✖</span>
    <img id="popupImg">
    <h2 id="popupTitle"></h2>
    <p id="popupDesc"></p>
    <a id="popupLink" target="_blank" class="buy-btn">Voir le produit</a>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
